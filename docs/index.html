<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOFS Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #14161ff2; color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }
        header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 50px; }
        header img { max-width: 180px; max-height: 180px; width: auto; height: auto; object-fit: contain; margin-bottom: 24px; }
        header h1 { color: #ccfc00; font-size: 2.8em; margin-bottom: 10px; }
        header p { color: rgba(255,255,255,0.6); font-size: 1em; }
        @media (min-width: 600px) {
            header { flex-direction: row; text-align: left; gap: 30px; }
            header img { margin-bottom: 0; flex-shrink: 0; }
        }
        h2.section-label {
            color: rgba(255,255,255,0.4); font-size: 0.75em; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;
            align-self: flex-start; width: 100%; max-width: 700px;
        }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; width: 100%; max-width: 700px; }
        .season-card {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            aspect-ratio: 1 / 1; background: black; border: 2px solid transparent;
            border-radius: 12px; text-decoration: none; color: white;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
            padding: 24px; cursor: pointer; user-select: none;
        }
        .season-card:hover, .season-card:focus { border-color: #ccfc00; background: #0e1014; transform: translateY(-3px); outline: none; }
        .season-card:active { background: #512f89; transform: translateY(0); }
        .season-card .season-label { color: #ccfc00; font-size: 0.75em; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
        .season-card .season-name { font-size: 1.6em; font-weight: 700; margin-bottom: 6px; }
        .season-card .season-year { color: rgba(255,255,255,0.45); font-size: 0.85em; }
        .season-card .season-desc { color: rgba(255,255,255,0.35); font-size: 0.75em; margin-top: 12px; text-align: center; }
        footer { margin-top: 60px; color: rgba(255,255,255,0.25); font-size: 0.8em; text-align: center; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="OOFS Logo">
        <div>
            <h1>OOFS Analytics</h1>
            <p>Race pace statistics &amp; driver performance</p>
        </div>
    </header>
    <h2 class="section-label">Select a Season</h2>
    <div class="card-grid">
        <a class="season-card" href="season1/sprint_race.html">
            <span class="season-label">Season</span>
            <span class="season-name">Season 3</span>
            <span class="season-year">2026</span>
            <span class="season-desc">OOFS S3</span>
        </a>
        <a class="season-card" href="season2/sprint_race.html">
            <span class="season-label">Season</span>
            <span class="season-name">Season 4</span>
            <span class="season-year">2026</span>
            <span class="season-desc">OOFS S4</span>
        </a>
    </div>
    <footer><p>Generated from OOFS XML Race Data</p></footer>
</body>
</html>
